<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>کافه عبدالصمد</title>
<style>

.header{text-align:center;padding:30px 20px;background:#fff;border-radius:16px;margin-top:20px;box-shadow:0 2px 10px rgba(0,0,0,.08)}
h1{margin:0;color:#6f4e37}
.card{background:#fff;border-radius:16px;padding:20px;margin-top:20px;box-shadow:0 2px 10px rgba(0,0,0,.08)}
.item{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #eee}
.item:last-child{border-bottom:none}

</div>

<div class="card">

<p>پس از انتشار سایت، لینک نهایی را داخل QR قرار دهید.</p>
</div>

<div class="card">

</div>
</div>
</body>
</html>
